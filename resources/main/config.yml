discord:
  bot-token: "PUT_BOT_TOKEN_HERE"
  channel-id: "PUT_TEXT_CHANNEL_ID_HERE"
  # Leave blank on first run. The plugin will create a message, save the ID,
  # and edit that same message on future updates.
  message-id: ""
  # Optional heading shown above the player list.
  header: "**Server Activity Status**"
  # If true, the plugin appends the last login date to each line.
  include-last-login-date: false

activity:
  inactive-after-days: 30

updates:
  interval-minutes: 60
  update-on-join: true
  update-on-quit: true
  update-on-enable: true
