name: LastSeenDiscord
version: ${version}
main: com.example.lastseendiscord.LastSeenDiscordPlugin
api-version: '26.1.2'
author: OpenAI
website: https://openai.com
commands:
  lastseendiscord:
    description: Reloads the LastSeenDiscord config and forces a Discord sync.
    usage: /<command> reload|sync
    permission: lastseendiscord.admin
    aliases: [lsd]
permissions:
  lastseendiscord.admin:
    description: Allows reloading and syncing LastSeenDiscord.
    default: op
