discord:
  webhook-url: "PUT_DISCORD_WEBHOOK_URL_HERE"
  # Leave this list empty on first run. The plugin will create as many webhook
  # messages as needed to fit the player list and save all message IDs.
  # On future updates, IDs are patched in order, extra IDs are created when needed,
  # and stale IDs are deleted when fewer chunks are required.
  # Backward compatibility: if legacy `message-id` is present, it is migrated into
  # this list on the first sync.
  message-ids: []
  # Legacy single-message setting retained for backward compatibility migration.
  # New installs should leave this blank and use `message-ids` above.
  message-id: ""
  # Optional heading shown above the player list.
  header: "**Server Activity Status**"
  # If true, the plugin appends the last login date to each line.
  include-last-login-date: false

activity:
  inactive-after-days: 30

updates:
  interval-minutes: 1440
  update-on-join: true
  update-on-quit: true
  update-on-enable: true
